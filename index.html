<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f6f4f0;
      --surface: #ffffff;
      --text: #1c1c1a;
      --muted: #5c5c56;
      --line: #e2dfd8;
      --accent: #3d6b5c;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: "EB Garamond", "Georgia", serif;
      font-size: clamp(1.0625rem, 1rem + 0.35vw, 1.1875rem);
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      min-height: 100dvh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 4rem) clamp(1.25rem, 6vw, 5rem);
    }

    .card {
      width: 100%;
      max-width: min(42rem, 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
    }

    h1 {
      margin: 0 0 0.2rem;
      font-size: clamp(2rem, 1.65rem + 1.1vw, 2.75rem);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .role {
      margin: 0 0 1.25rem;
      font-size: clamp(0.9375rem, 0.9rem + 0.2vw, 1.0625rem);
      font-weight: 500;
      color: var(--accent);
    }

    p {
      margin: 0 0 1rem;
      color: var(--muted);
    }

    p:last-of-type {
      margin-bottom: 1.35rem;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 0.35rem 1.1rem;
      padding-top: 0;
      width: 100%;
    }

    .icon-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      color: var(--text);
      text-decoration: none;
      border: none;
      background: transparent;
      border-radius: 0.35rem;
      cursor: pointer;
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .icon-link:hover {
      color: var(--accent);
      transform: translateY(-1px);
    }

    .icon-link:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .icon-link svg {
      width: 1.35rem;
      height: 1.35rem;
      display: block;
    }

    .discord-wrap {
      position: relative;
      display: inline-flex;
    }

    .discord-tip {
      position: absolute;
      bottom: calc(100% + 0.45rem);
      left: 50%;
      transform: translateX(-50%);
      padding: 0.35rem 0.55rem;
      font-family: "EB Garamond", "Georgia", serif;
      font-size: 0.8125rem;
      font-weight: 500;
      line-height: 1.2;
      white-space: nowrap;
      color: var(--bg);
      background: var(--text);
      border-radius: 0.25rem;
      box-shadow: 0 2px 10px rgba(28, 28, 26, 0.12);
      pointer-events: none;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.15s ease, visibility 0.15s ease;
    }

    .discord-tip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -0.35rem;
      border: 0.35rem solid transparent;
      border-top-color: var(--text);
    }

    .discord-wrap:hover .discord-tip,
    .discord-wrap:focus-within .discord-tip,
    .discord-wrap.is-tip-open .discord-tip {
      opacity: 1;
      visibility: visible;
    }
  </style>
</head>
<body>

          <span id="discord-username-tip" class="discord-tip" role="tooltip">wizardstrike1</span>
        </span>
      </nav>
    </main>
  </div>
  <script>
    (function () {
      var wrap = document.querySelector(".discord-wrap");
      var btn = wrap && wrap.querySelector("button");
      if (!wrap || !btn) return;
      btn.addEventListener("click", function (e) {
        e.stopPropagation();
        wrap.classList.toggle("is-tip-open");
      });
      document.addEventListener("click", function () {
        wrap.classList.remove("is-tip-open");
      });
    })();
  </script>

</html>
